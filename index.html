<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Campus AR Navigation</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      #start-menu {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background-color: #f4f4f9; z-index: 2000; display: flex;
        flex-direction: column; align-items: center; padding-top: 50px;
        padding-bottom: 80px; font-family: sans-serif;
        overflow-y: scroll; -webkit-overflow-scrolling: touch;
      }
      h1 { color: #333; font-size: 1.5rem; margin-bottom: 20px; }
      .dest-card {
        background: white; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        margin-bottom: 20px; overflow: hidden; width: 80%; max-width: 300px; text-align: center; flex-shrink: 0;
      }
      .dest-card img { width: 100%; height: 150px; object-fit: cover; }
      .dest-card h2 { font-size: 1.2rem; margin: 15px 0; color: #007BFF; }
      #status {
        position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
        background-color: rgba(0, 0, 0, 0.7); color: white; padding: 15px 20px;
        border-radius: 10px; font-size: 1rem; font-family: sans-serif; z-index: 1000; text-align: center; width: 80%; display: none;
      }
      #distance-display {
        position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
        background-color: rgba(255, 255, 255, 0.9); color: #333; padding: 15px 30px;
        border-radius: 30px; font-size: 1.5rem; font-weight: bold; font-family: sans-serif;
        z-index: 1000; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: none; white-space: nowrap;
      }
      .unit { font-size: 1rem; color: #666; }
      .arrived-text { color: #e91e63; font-size: 1.2rem; }
    </style>

    <script>
      let arrowTargetY = -1.0; // 矢印の初期の高さ (-1m)
      let modelTargetY = 1.0;  // 到着モデルの初期の高さ (3mから1mに下げました)

      window.changeHeight = (type, delta) => {
        if (type === 'arrow') {
          arrowTargetY += delta;
          const arrow = document.getElementById('nav-arrow-shape');
          if (arrow) {
            const pos = arrow.getAttribute('position');
            arrow.setAttribute('position', `${pos.x} ${arrowTargetY} ${pos.z}`);
          }
        } else if (type === 'model') {
          modelTargetY += delta;
          const model = document.getElementById('nav-info-model');
          if (model) {
            // アニメーション設定を更新
            model.setAttribute('animation__pos', `property: position; from: 0 0 0; to: 0 ${modelTargetY} 0; dur: 1500; easing: easeOutElastic; startEvents: popup`);
            // 既に表示中（到着済み）ならその場で高さを変える
            if (model.getAttribute('visible') === 'true' || model.getAttribute('visible') === true) {
              model.setAttribute('position', `0 ${modelTargetY} 0`);
            }
          }
        }
      };
      function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const radLat1 = lat1 * Math.PI / 180; const radLat2 = lat2 * Math.PI / 180;
        const deltaLat = (lat2 - lat1) * Math.PI / 180; const deltaLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(deltaLat/2) * Math.sin(deltaLat/2) +
                  Math.cos(radLat1) * Math.cos(radLat2) * Math.sin(deltaLon/2) * Math.sin(deltaLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      }
      function getBearing(lat1, lon1, lat2, lon2) {
        const radLat1 = lat1 * Math.PI / 180; const radLat2 = lat2 * Math.PI / 180;
        const deltaLon = (lon2 - lon1) * Math.PI / 180;
        const y = Math.sin(deltaLon) * Math.cos(radLat2);
        const x = Math.cos(radLat1) * Math.sin(radLat2) - Math.sin(radLat1) * Math.cos(radLat2) * Math.cos(deltaLon);
        return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
      }

      const destinations = {
        "place1": { name: "本館",lat:35.844931, lon:139.360084, infoModel: "info.glb" },
        "place2": { name: "12号館", lat:35.645610, lon:139.408008, infoModel: "info.glb" },
        "place3": { name: "13号館", lat:35.645952, lon:139.409186, infoModel: "info.glb" },
        "place4": { name: "資料図書館（15号館）", lat:35.644231, lon:139.406317, infoModel: "info.glb" },
        "place5": { name: "1号館", lat: 35.645307, lon:139.408360, infoModel: "info.glb" },
        "place6": { name: "大学会館(22号館)", lat: 35.644464, lon: 139.408831, infoModel: "info.glb" },
        "place7": { name: "体育館(25号館)", lat: 35.643480, lon: 139.408686, infoModel: "info.glb" },
        "place8": { name: "26号館", lat:35.644096,lon: 139.407233, infoModel: "info.glb" },
        "place9": { name: "27号館", lat:35.644075,lon: 139.408067, infoModel: "info.glb" },
        "place10": { name: "28号館", lat:35.645255,lon: 139.407549, infoModel: "info.glb" },
        "place11": { name: "部活棟", lat:35.645476,lon:139.407983, infoModel: "info.glb" }
      };

      let watchId;
      window.startNavigation = (placeKey) => {
        const dest = destinations[placeKey];
        document.getElementById('start-menu').style.display = 'none';
        const statusDiv = document.getElementById('status');
        const distanceDisplay = document.getElementById('distance-display');
        const scene = document.querySelector('a-scene');
        
        statusDiv.style.display = 'block';
        statusDiv.innerHTML = "GPSを受信中...<br>少しお待ちください";
        document.getElementById('control-menu').style.display = 'block'; // ★この1行だけ追加
        let isInitialized = false;
        let isArrived = false;
        let infoModelElement;
        let navArrowWrapper;

        watchId = navigator.geolocation.watchPosition(
          (position) => {
            const currentLat = position.coords.latitude;
            const currentLon = position.coords.longitude;
            const currentDistance = Math.floor(getDistance(currentLat, currentLon, dest.lat, dest.lon));

            // 到着判定
            if (currentDistance <= 3) {
              if (!isArrived) {
                distanceDisplay.innerHTML = `<span class="arrived-text">目的地に到着しました！</span>`;
                if (infoModelElement) {
                  infoModelElement.setAttribute('visible', 'true');
                  // ★変更点1: 到着した瞬間に「popup」イベントを発火させる
                  infoModelElement.emit('popup'); 
                }
                if (navArrowWrapper) navArrowWrapper.setAttribute('visible', 'false');
                isArrived = true;
              }
            } else {
              distanceDisplay.innerHTML = `目的地まで あと ${currentDistance} <span class="unit">m</span>`;
              if (isArrived) {
                if (infoModelElement) infoModelElement.setAttribute('visible', 'false');
                if (navArrowWrapper) navArrowWrapper.setAttribute('visible', 'true');
                isArrived = false;
              }
            }
            distanceDisplay.style.display = 'block';

            // ★ ここで「自分から何m先に矢印を出すか」を計算（15m推奨）
            let arrowDistance = 10; // 50にしたい場合はここを50に変えてください
            if (currentDistance < arrowDistance) {
              arrowDistance = currentDistance; 
            }
            
            // 安全装置（エラー回避）
            let ratio = 0;
            if (currentDistance > 0) {
               ratio = arrowDistance / currentDistance;
            }

            const arrowLat = currentLat + (dest.lat - currentLat) * ratio;
            const arrowLon = currentLon + (dest.lon - currentLon) * ratio;
            const bearing = getBearing(currentLat, currentLon, dest.lat, dest.lon);
            const arrowRotationY = -bearing;

            if (!isInitialized) {
              statusDiv.innerHTML = "案内スタート！<br>矢印の方向へ進んでください";
              setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
              
              const goalWrapper = document.createElement('a-entity');
              goalWrapper.setAttribute('gps-entity-place', `latitude: ${dest.lat}; longitude: ${dest.lon};`);
              
              const ripple = document.createElement('a-ring');
              ripple.setAttribute('color', '#00FFFF');
              ripple.setAttribute('radius-inner', '1.5');
              ripple.setAttribute('radius-outer', '2.0');
              ripple.setAttribute('position', '0 0.1 0');
              ripple.setAttribute('rotation', '-90 0 0');
              ripple.setAttribute('animation', 'property: scale; from: 1 1 1; to: 4 4 4; dur: 2000; loop: true; easing: linear');
              ripple.setAttribute('animation__opacity', 'property: opacity; from: 0.8; to: 0; dur: 2000; loop: true; easing: linear');
              goalWrapper.appendChild(ripple);

              infoModelElement = document.createElement('a-entity');
              infoModelElement.setAttribute('gltf-model', `url(./${dest.infoModel})`);
              // ★変更点2: 最初は地面の高さ(0 0 0)で、極小サイズ(0.1)にセットしておく
              infoModelElement.setAttribute('position', '0 0 0'); 
              infoModelElement.setAttribute('scale', '0.1 0.1 0.1');
              infoModelElement.setAttribute('visible', 'false');
              
              // ★変更点3: popupイベントを受け取ったら、ぶわんっ（easeOutElastic）と拡大＆上昇するアニメーション
              infoModelElement.setAttribute('animation__scale', 'property: scale; from: 0.1 0.1 0.1; to: 1 1 1; dur: 1500; easing: easeOutElastic; startEvents: popup');
              infoModelElement.setAttribute('animation__pos', 'property: position; from: 0 0 0; to: 0 3 0; dur: 1500; easing: easeOutElastic; startEvents: popup');

              goalWrapper.appendChild(infoModelElement);

              scene.appendChild(goalWrapper);

              // ★ バグ修正箇所：最初からGPS座標を矢印に埋め込む！
              navArrowWrapper = document.createElement('a-entity');
              navArrowWrapper.setAttribute('gps-entity-place', `latitude: ${arrowLat}; longitude: ${arrowLon};`);
              navArrowWrapper.setAttribute('rotation', `0 ${arrowRotationY} 0`);

              const arrowShape = document.createElement('a-cone');
              arrowShape.setAttribute('color', '#FFEB3B'); // 黄色
              arrowShape.setAttribute('position', '3 -1 0');
              arrowShape.setAttribute('radius-bottom', '1.0'); // 太さ
              arrowShape.setAttribute('height', '1.0');        // 長さ
              arrowShape.setAttribute('rotation', '-110 0 0'); // おじぎ角度
              
              navArrowWrapper.appendChild(arrowShape);
              scene.appendChild(navArrowWrapper);

              isInitialized = true;
            } else if (!isArrived && navArrowWrapper) {
              // 2回目以降のGPS更新（歩いた時）
              navArrowWrapper.setAttribute('gps-entity-place', `latitude: ${arrowLat}; longitude: ${arrowLon};`);
              navArrowWrapper.setAttribute('rotation', `0 ${arrowRotationY} 0`);
            }
          },
          (error) => {
            console.error("位置情報エラー", error);
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = "位置情報の取得に失敗しました";
            statusDiv.style.backgroundColor = "rgba(255, 0, 0, 0.7)";
          },
          { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
        );
      };
    </script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <div id="start-menu">
      <h1>目的地を選んでください</h1>
      <div class="dest-card" onclick="startNavigation('place1')"><img src="./honkan.jpg" alt="本館"><h2>本館へ行く</h2></div>
      <div class="dest-card" onclick="startNavigation('place2')"><img src="./12.jpg" alt="12号館"><h2>12号館へ行く</h2></div>
      <div class="dest-card" onclick="startNavigation('place3')"><img src="./13.jpg" alt="13号館"><h2>13号館へ行く</h2></div>
      <div class="dest-card" onclick="startNavigation('place4')"><img src="./tosyokan.jpg" alt="資料図書館(15号館）"><h2>資料図書館(15号館)へ行く</h2></div>
      <div class="dest-card" onclick="startNavigation('place5')"><img src="./1.jpg" alt="1号館"><h2>1号館へ行く</h2></div>
      <div class="dest-card" onclick="startNavigation('place6')"><img src="./gakusyoku.jpg" alt="大学会館"><h2>大学会館へ行く</h2></div>
      <div class="dest-card" onclick="startNavigation('place7')"><img src="./25.jpg" alt="体育館（25号館）"><h2>体育館（25号館）へ行く</h2></div>
      <div class="dest-card" onclick="startNavigation('place8')"><img src="./26.jpg" alt="26号館"><h2>26号館へ行く</h2></div>
      <div class="dest-card" onclick="startNavigation('place9')"><img src="./27.jpg" alt="27号館"><h2>27号館へ行く</h2></div>
      <div class="dest-card" onclick="startNavigation('place10')"><img src="./28.jpg" alt="28号館"><h2>28号館へ行く</h2></div>
      <div class="dest-card" onclick="startNavigation('place11')"><img src="./bukatu.jpg" alt="部活棟"><h2>部活棟へ行く</h2></div>
    </div>

    <div id="status"></div>
    <div id="distance-display"></div>
    
　　<div id="control-menu" style="display: none; position: fixed; bottom: 100px; right: 10px; z-index: 2000; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-family: sans-serif; text-align: center;">
      <div style="font-size: 0.9rem; font-weight: bold; margin-bottom: 5px;">高さ調節</div>
      <div style="margin-bottom: 10px;">
        <span style="font-size: 0.8rem;">矢印:</span>
        <button onclick="changeHeight('arrow', 0.5)" style="padding: 5px 10px;">上</button>
        <button onclick="changeHeight('arrow', -0.5)" style="padding: 5px 10px;">下</button>
      </div>
      <div>
        <span style="font-size: 0.8rem;">到着時:</span>
        <button onclick="changeHeight('model', 0.5)" style="padding: 5px 10px;">上</button>
        <button onclick="changeHeight('model', -0.5)" style="padding: 5px 10px;">下</button>
      </div>
    </div>
    
    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>
  </body>
</html>
